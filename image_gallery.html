<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gallery">
        <figure class="figure">
            <img class="image" src="hunterhunter.png" alt="Hunter X Hunter">
            <figcaption class="figcaption">Hunter X Hunter</figcaption>
        </figure>
        <figure class="figure">
            <img class="image" src="kokoshibo.jpg" alt="Kokoshibo">
            <figcaption class="figcaption">Kokoshibo</figcaption>
        </figure>
        <figure class="figure">
            <img class="image" src="your_name.jpg" alt="Your name">
            <figcaption class="figcaption">Your Name</figcaption>
        </figure>
        <figure class="figure">
            <img class="image" src="weathering.jpg" alt="Weathering with you">
            <figcaption class="figcaption"  >Weathering with You</figcaption>
        </figure>
        <figure class="figure" >
            <img class="image" src="zoro.jpg" alt="Zoro">
            <figcaption class="figcaption">Zoro</figcaption>
        </figure>
    </div>
</body>
</html>
