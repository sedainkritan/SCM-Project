<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up - Swap & Share</title>
  <link rel="stylesheet" href="login_page.css">
  <link rel="stylesheet" href="../Header/header.css">
  <link rel="stylesheet" href="../Header/footer.css">
  <script src="auth.js"></script>
</head>
<body>
  <div id="header"></div>

  <div class="auth-container">
    <h2>Signup</h2>
    <form onsubmit="signup(event)">
      <div class="input-group">
        <input id="fullname" placeholder=" " required>
        <label>Full Name</label>
      </div>
      <div class="input-group">
        <input id="username" placeholder=" " required>
        <label>Username</label>
      </div>
      <div class="input-group">
        <input id="email" type="email" placeholder=" " required>
        <label>Email</label>
      </div>
      <div class="input-group">
        <input id="password" type="password" placeholder=" " required>
        <label>Password</label>
      </div>
      <div class="input-group">
        <input id="confirm" type="password" placeholder=" " required>
        <label>Confirm Password</label>
      </div>

      <label class="checkbox">
        <input type="checkbox" required> I agree to Terms & Conditions
      </label>

      <button type="submit" class="auth-submit-btn">Signup</button>

      <p style="margin-top:10px; color:#1b3d2f; font-size:14px;">
        Already have an account? <a href="login_page.html" class="link" style="display:inline;">Log In</a>
      </p>
    </form>
  </div>

  <div id="footer"></div>
  <script src="../Header/header.js"></script>
</body>
</html>
