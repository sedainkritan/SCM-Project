<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="login_page.css">
  <!-- ✅ Make sure auth.js is in the same folder (Loginpage) -->
  <script src="auth.js"></script>
</head>
<body>
  <div class="auth-container">
    <h2>Login</h2>
    <!-- ✅ Calls login(event) from auth.js -->
    <form onsubmit="login(event)">
      <div class="input-group">
        <input type="text" id="loginEmail" placeholder=" " required>
        <label>Email / Username</label>
      </div>
      <div class="input-group">
        <input type="password" id="loginPassword" placeholder=" " required>
        <label>Password</label>
      </div>
      <label class="checkbox"><input type="checkbox" id="remember"> Remember Me</label>
      <button type="submit">Login</button>

      <!-- ✅ Correct links to other pages -->
      <a href="forgetpsw.html" class="link">Forgot Password?</a>
      <a href="sign-uppage.html" class="link">Create Account</a>
    </form>
  </div>
</body>
</html>
