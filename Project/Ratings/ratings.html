<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ratings & Reviews</title>
  <link rel="stylesheet" href="ratings.css">
  <link rel="stylesheet" href="../Header/header.css">
  <link rel="stylesheet" href="../Header/footer.css">
</head>
<body>
  <div id="header"></div>
  <div class="reviews-container">

    <!-- Rating Summary -->
    <section class="rating-summary">
      <div class="average-rating">
        <h2 id="avgRating">4.6</h2>
        <div class="stars" id="avgStars"></div>
        <p id="totalReviews">120 reviews</p>
      </div>
      <div class="rating-bars" id="ratingBars"></div>
    </section>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="popular">Popular Reviews</button>
      <button class="tab" data-tab="latest">Latest Reviews</button>
      <button class="tab" data-tab="my">My Reviews</button>
    </div>

    <!-- Add Review Form -->
    <section class="add-review">
      <h3>Add Your Review</h3>
      <form id="reviewForm">
        <input type="text" id="username" placeholder="Your name">
        <div class="star-selector" id="starSelector"></div>
        <textarea id="reviewText" maxlength="300" placeholder="Write your review..."></textarea>
        <div class="char-counter"><span id="charCount">0</span>/300</div>
        <button type="submit">Submit Review</button>
      </form>
    </section>

    <!-- Search -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search by username...">
    </div>

    <!-- Reviews Display -->
    <section class="reviews-list" id="reviewsList"></section>

    <!-- Empty State -->
    <p class="empty-state" id="emptyState">No reviews yet. Be the first to add one!</p>

  </div>
  <div id="footer"></div>
  <script src="ratings.js"></script>
  <script src="../Header/header.js"></script>
</body>
</html>
