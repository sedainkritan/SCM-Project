<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .error {
            color: red;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <form action="/submit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
        <span class="error" id="nameError"></span><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
        <span class="error" id="emailError"></span>
        <br><br>

        <button type="submit">Submit</button>
    </form>

    <script>
        document.querySelector('form').addEventListener('submit', function(event) {
            event.preventDefault();
            let valid = true;
            console.log('Form submission prevented for validation.');
            // Validate name
            const name = document.getElementById('name').value;
            if (name.trim() === '') {
                document.getElementById('nameError').textContent = 'Name is required.';
                valid = false;
                console.log('Name validation failed: Name is required.');
            } else {
                document.getElementById('nameError').textContent = '';
                console.log('Name validation passed.');
            }

            // Validate email
            const email = document.getElementById('email').value;
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                document.getElementById('emailError').textContent = 'Please enter a valid email address.';
                valid = false;
                console.log('Email validation failed: Please enter a valid email address.');
            } else {
                document.getElementById('emailError').textContent = '';
                console.log('Email validation passed.');
            }

            if (!valid) {
                alert('Please fix the errors in the form before submitting.');
            }
            else {
                console.log('Form is valid. Submitting form.');
                alert('Form submitted successfully!');
            }
        });
    </script>
</body>
</html>
