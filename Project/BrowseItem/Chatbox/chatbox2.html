<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swap & Share Chat</title>
  <link rel="stylesheet" href="chatbox.css">
</head>
<body>
  <div class="chat-wrapper">
    <header class="chat-header">
      <img src="profile.png" alt="Profile" class="profile-pic">
      <div class="user-info">
        <h3>Jonathan Patterson</h3>
        <p>Online</p>
      </div>
    </header>

    <main class="chat-body" id="chatBody">
     <div class="message received">This item is listed for sale. Do you want to place an order?</div>
<div class="message sent">Yes, please. I’d like to confirm my purchase.</div>
    </main>

    <footer class="chat-input">
      <input type="text" id="messageInput" placeholder="Type a message...">
      <button id="sendBtn">Send</button>
    </footer>
  </div>
  <script src="chatbox.js"></script>
</body>
</html>
